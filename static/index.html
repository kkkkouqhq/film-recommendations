<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>电影推荐 · Film Recommender</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --border: #2d3a4d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1e3a5f 0%, var(--bg) 55%);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 3rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 0.35rem;
      letter-spacing: -0.02em;
    }
    .sub {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.75rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.35rem;
      margin-bottom: 1.25rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 480px) {
      .row { grid-template-columns: 1fr; }
    }
    input {
      width: 100%;
      padding: 0.55rem 0.65rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0d1218;
      color: var(--text);
      font-size: 1rem;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
    }
    button {
      width: 100%;
      margin-top: 1rem;
      padding: 0.65rem 1rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.08); }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .err {
      color: #f87171;
      font-size: 0.875rem;
      margin-top: 0.75rem;
      display: none;
    }
    .err.show { display: block; }
    .list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .list li {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.75rem;
      padding: 0.65rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.95rem;
    }
    .list li:last-child { border-bottom: none; }
    .title { flex: 1; min-width: 0; word-break: break-word; }
    .score {
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .empty { color: var(--muted); font-size: 0.9rem; }
    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
    footer a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>电影推荐</h1>
    <p class="sub">基于用户协同过滤（MovieLens 数据）。输入用户 ID 与返回条数后获取推荐。</p>

    <div class="card">
      <div class="row">
        <div>
          <label for="userId">用户 ID</label>
          <input id="userId" type="number" min="1" value="1" />
        </div>
        <div>
          <label for="topN">返回条数 top_n</label>
          <input id="topN" type="number" min="1" max="50" value="5" />
        </div>
      </div>
      <button type="button" id="btn">获取推荐</button>
      <p class="err" id="err"></p>
    </div>

    <div class="card">
      <label>推荐结果</label>
      <ul class="list" id="list"></ul>
      <p class="empty" id="empty" style="display: none;">暂无数据，请点击「获取推荐」。</p>       #貌似这个内容永远不会显示？因为判断不为空，这个<p>就会被隐藏，判断为空，这个<p>又会被覆盖？
    </div>

    <footer>
      API 文档：<a href="/docs" target="_blank" rel="noopener">/docs</a>
      · 静态资源路径：<code>/static/index.html</code>
    </footer>
  </div>

  <script>
    (function () {
      const $ = function (id) { return document.getElementById(id); };
      const listEl = $("list");
      const emptyEl = $("empty");
      const errEl = $("err");
      const btn = $("btn");

      function showErr(msg) {
        errEl.textContent = msg || "";
        errEl.classList.toggle("show", !!msg);
      }

      function render(data) {
        listEl.innerHTML = "";
        const items = data.items || [];
        if (items.length === 0) {
          emptyEl.style.display = "block";
          emptyEl.textContent = "该条件下无推荐结果（或列表为空）。";
          return;
        }
        emptyEl.style.display = "none";
        items.forEach(function (item) {
          const li = document.createElement("li");
          const t = document.createElement("span");
          t.className = "title";
          t.textContent = item.title != null ? item.title : "(无标题) #" + item.movie_id;
          const s = document.createElement("span");
          s.className = "score";
          s.textContent = typeof item.score === "number" ? item.score.toFixed(4) : String(item.score);
          li.appendChild(t);
          li.appendChild(s);
          listEl.appendChild(li);
        });
      }

      async function fetchRecommend() {
        showErr("");
        const uid = parseInt($("userId").value, 10);
        const topN = parseInt($("topN").value, 10);
        if (Number.isNaN(uid) || uid < 1) {
          showErr("请输入有效的用户 ID（正整数）。");
          return;
        }
        if (Number.isNaN(topN) || topN < 1 || topN > 50) {
          showErr("top_n 需在 1～50 之间。");
          return;
        }

        btn.disabled = true;
        try {
          // 同源请求：页面与 API 都是本机 8000 端口，相对路径即可
          const url = "/recommend/" + encodeURIComponent(uid) + "?top_n=" + encodeURIComponent(topN);
          const res = await fetch(url);
          const body = await res.json().catch(function () { return {}; });
          if (!res.ok) {
            showErr(body.detail != null ? String(body.detail) : "请求失败 (" + res.status + ")");
            return;
          }
          render(body);
        } catch (e) {
          showErr("网络错误：请确认已启动服务（python -m uvicorn app:app）。");
        } finally {
          btn.disabled = false;
        }
      }

      btn.addEventListener("click", fetchRecommend);
      fetchRecommend();
    })();
  </script>
</body>
</html>
